services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: usermanager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: usermanager
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      OAUTH2_ISSUER_URI: ${OAUTH2_ISSUER_URI:http://localhost:9000}
    depends_on:
      - postgres

volumes:
  pgdata:
